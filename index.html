<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Newson Sportec | California Weather Report</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f4f8ff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .weather-image {
      width: 100%;
      max-width: 1600px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 40, 100, 0.16);
      display: block;
    }

    .caption {
      text-align: center;
      margin-top: 18px;
      color: #304467;
      font-weight: 700;
      font-size: 15px;
    }

    @media (max-width: 768px) {
      .page {
        padding: 10px;
      }

      .weather-image {
        border-radius: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div>
      <img
        class="weather-image"
        src="weather-front.png"
        alt="Newson Sportec California Weather Report"
      />

      <p class="caption">
        Newson Sportec • California Weather Report • Open Data Weather Project
      </p>
    </div>
  </main>
</body>
</html>
